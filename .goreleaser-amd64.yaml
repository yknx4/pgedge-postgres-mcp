# GoReleaser configuration for x86_64 (amd64) architecture
# This builds only amd64 binaries on native x86_64 runner
# https://goreleaser.com

version: 2

before:
    hooks:
        # Format code
        - go fmt ./...

builds:
    # MCP Server - amd64 (all platforms)
    - id: pgedge-postgres-mcp-amd64
      binary: pgedge-postgres-mcp
      main: ./cmd/pgedge-pg-mcp-svr
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
      ldflags:
          - -s -w
          - -X main.version={{.Version}}
          - -X main.commit={{.Commit}}
          - -X main.date={{.Date}}
          - -X main.builtBy=goreleaser

    # CLI Client - amd64 (all platforms)
    - id: pgedge-nla-cli-amd64
      binary: pgedge-nla-cli
      main: ./cmd/pgedge-pg-mcp-cli
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
      ldflags:
          - -s -w
          - -X main.version={{.Version}}
          - -X main.commit={{.Commit}}
          - -X main.date={{.Date}}
          - -X main.builtBy=goreleaser

archives:
    # Server archive - amd64 only
    - id: server-amd64
      builds:
          - pgedge-postgres-mcp-amd64
      name_template: >-
          {{ .ProjectName }}-server_
          {{- .Version }}_
          {{- .Os }}_x86_64
      format_overrides:
          - goos: windows
            format: zip
      files:
          - README.md
          - LICENSE.md
          - docs/**/*
          - examples/pgedge-postgres-mcp-custom.yaml
          - examples/.env.example

    # CLI archive - amd64 only
    - id: cli-amd64
      builds:
          - pgedge-nla-cli-amd64
      name_template: >-
          {{ .ProjectName }}-cli_
          {{- .Version }}_
          {{- .Os }}_x86_64
      format_overrides:
          - goos: windows
            format: zip
      files:
          - README.md
          - LICENSE.md
          - docs/**/*

    # Web UI archive (noarch - built in build-web job, not here)
    # Web UI is architecture-independent and built once in the workflow

snapshot:
    version_template: "{{ incpatch .Version }}-next"

# Disable release creation - will be done in final job
release:
    disable: true
