name: Docker - Build and Publish

on:
    push:
        tags: ['v*']
    # Allow manual trigger with KB_SOURCE input
    workflow_dispatch:
        inputs:
            kb_source:
                description: 'Knowledgebase source URL for -with-kb image (leave empty to skip)'
                required: false
                default: ''
                type: string
            publish:
                description: 'Publish images to registry'
                required: false
                default: 'true'
                type: choice
                options:
                    - 'true'
                    - 'false'

env:
    REGISTRY: ghcr.io
    IMAGE_NAME_SERVER: pgedge/postgres-mcp
    IMAGE_NAME_WEB: pgedge/nla-web
    IMAGE_NAME_CLI: pgedge/nla-cli

jobs:
    build-server:
        name: Build MCP Server Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        outputs:
            image-digest: ${{ steps.build.outputs.digest }}

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for server image
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push server image
              id: build
              uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
              with:
                  context: .
                  file: Dockerfile.server
                  push: ${{ github.event_name != 'pull_request' && (github.event.inputs.publish != 'false') }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      CACHE_DATE=${{ github.run_id }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

    build-server-with-kb:
        name: Build MCP Server Image (with Knowledgebase)
        runs-on: ubuntu-latest
        needs: build-server
        # Only build with-kb image on tags or manual trigger with kb_source
        if: |
            startsWith(github.ref, 'refs/tags/') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.kb_source != '')
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Determine KB source
              id: kb-source
              env:
                  KB_SOURCE_INPUT: ${{ github.event.inputs.kb_source }}
              run: |
                  # Default: install the pgedge-ai-kb package from the pgEdge dnf
                  # repo inside the image (Dockerfile.server handles the "package"
                  # sentinel; the package ships kb.db at
                  # /usr/share/pgedge/pgedge-ai-kb/kb.db). A manual
                  # workflow_dispatch can still pass a kb.db URL via the
                  # kb_source input to override.
                  if [ -n "$KB_SOURCE_INPUT" ]; then
                      echo "url=$KB_SOURCE_INPUT" >> $GITHUB_OUTPUT
                  else
                      echo "url=package" >> $GITHUB_OUTPUT
                  fi

            - name: Extract metadata for KB image
              id: meta-kb
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
                  flavor: |
                      suffix=-with-kb,onlatest=true
                  tags: |
                      type=ref,event=branch,suffix=-with-kb
                      type=semver,pattern={{version}},suffix=-with-kb
                      type=semver,pattern={{major}}.{{minor}},suffix=-with-kb
                      type=sha,suffix=-with-kb
                      type=raw,value=latest-with-kb,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push KB image
              uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
              with:
                  context: .
                  file: Dockerfile.server
                  push: ${{ github.event.inputs.publish != 'false' }}
                  tags: ${{ steps.meta-kb.outputs.tags }}
                  labels: ${{ steps.meta-kb.outputs.labels }}
                  build-args: |
                      KB_SOURCE=${{ steps.kb-source.outputs.url }}
                      CACHE_DATE=${{ github.run_id }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

    build-web:
        name: Build Web UI Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for web image
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push web image
              uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
              with:
                  context: .
                  file: Dockerfile.web
                  push: ${{ github.event_name != 'pull_request' && (github.event.inputs.publish != 'false') }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      CACHE_DATE=${{ github.run_id }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

    build-cli:
        name: Build CLI Client Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for CLI image
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLI }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push CLI image
              uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
              with:
                  context: .
                  file: Dockerfile.cli
                  push: ${{ github.event_name != 'pull_request' && (github.event.inputs.publish != 'false') }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64
